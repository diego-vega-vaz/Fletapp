<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FletApp — Plataforma de logística terrestre</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles/tokens.css" />
<link rel="stylesheet" href="styles/components.css" />
<link rel="stylesheet" href="styles/shell.css" />
<style>
  #root { min-height: 100vh; }
  @media (max-width: 880px) {
    .login-brand { display: none !important; }
    div[style*="grid-template-columns: 1.05fr 1fr"] { grid-template-columns: 1fr !important; }
  }
  /* keep quote/pay sidebars from overflowing on mid widths */
  @media (max-width: 1100px) and (min-width: 981px) {
    .quote-cols { grid-template-columns: minmax(0,1fr) 240px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<!-- React + Babel (pinned) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<!-- Tweaks shell (after React, before app) -->
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel" src="src/screens/login.jsx"></script>
<script type="text/babel" src="src/screens/dashboard.jsx"></script>
